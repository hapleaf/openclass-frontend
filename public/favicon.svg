<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Green rounded square background -->
  <rect width="32" height="32" rx="7" fill="#1d6b3c"/>
  <!-- Subtle inner glow -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <defs>
    <radialGradient id="g" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Microphone body -->
  <rect x="12" y="5" width="8" height="13" rx="4" fill="white"/>
  <!-- Microphone arc -->
  <path d="M8 15.5C8 20.194 11.582 24 16 24C20.418 24 24 20.194 24 15.5" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Stand line -->
  <line x1="16" y1="24" x2="16" y2="28" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="12" y1="28" x2="20" y2="28" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
